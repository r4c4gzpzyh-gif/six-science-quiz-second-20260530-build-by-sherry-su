<!DOCTYPE html>
<html>
<head>
<title>科学闯关题库 - 教师后台</title>
<style>
/* 简单的表格样式 */
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
th { background: #4CAF50; color: white; }
tr:nth-child(even) { background: #f2f2f2; }
.btn { padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<div id="loginForm" style="max-width: 400px; margin: 100px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px;">
<h2>🔐 教师登录</h2>
<input type="password" id="password" placeholder="输入教师密码" style="width: 100%; padding: 10px; margin: 10px 0;">
<button onclick="teacherLogin()" class="btn" style="width: 100%; padding: 15px;">登录</button>
</div>
<div id="dashboard" style="display: none; max-width: 1200px; margin: 50px auto; padding: 20px;">
<h1>📊 科学闯关 - 学生数据总览</h1>
<p>共 <span id="totalStudents">0</span> 名学生 | 最后更新：<span id="lastUpdate"></span></p>
<button onclick="refreshData()" class="btn">🔄 刷新数据</button>
<button onclick="exportExcel()" class="btn" style="background: #4CAF50;">📥 导出Excel</button>
<div id="classTabs" style="margin: 20px 0;">
<button onclick="filterByClass('all')" class="btn">全部</button>
<button onclick="filterByClass('601')" class="btn">601班</button>
<button onclick="filterByClass('602')" class="btn">602班</button>
<button onclick="filterByClass('603')" class="btn">603班</button>
</div>
<table id="studentTable">
<thead>
<tr>
<th>班级</th>
<th>学号</th>
<th>姓名</th>
<th>等级</th>
<th>经验值</th>
<th>做对</th>
<th>做错</th>
<th>错题数</th>
<th>最后活跃</th>
</tr>
</thead>
<tbody id="studentData"></tbody>
</table>
</div>
<script>
const SUPABASE_URL = 'https://cbzaqplpnzjmrbudaomp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_MnZt1Lih0qB94eUEmMiSOg_2iZP_s6F';
function teacherLogin() {
const password = document.getElementById('password').value;
if (password === 'sherry2431446563') {
document.getElementById('loginForm').style.display = 'none';
document.getElementById('dashboard').style.display = 'block';
refreshData();
} else {
alert('密码错误！');
}
}
async function refreshData() {
const res = await fetch(SUPABASE_URL + '/rest/v1/students?order=class,student_id', {
headers: { 'apikey': SUPABASE_KEY }
});
const students = await res.json();
document.getElementById('totalStudents').textContent = students.length;
document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
const tbody = document.getElementById('studentData');
tbody.innerHTML = '';
students.forEach(s => {
tbody.innerHTML += `
<tr data-class="${s.class}">
<td>${s.class}</td>
<td>${s.student_id}</td>
<td>${s.name}</td>
<td>${s.level}</td>
<td>${s.exp}</td>
<td>${s.correct_count}</td>
<td>${s.wrong_count}</td>
<td>${JSON.parse(s.wrong_questions || '[]').length}</td>
<td>${new Date(s.last_active).toLocaleString()}</td>
</tr>
`;
});
}
function filterByClass(classId) {
const rows = document.querySelectorAll('#studentData tr');
rows.forEach(row => {
row.style.display = (classId === 'all' || row.dataset.class === classId) ? '' : 'none';
});
}
function exportExcel() {
// 导出Excel功能
alert('导出功能已就绪！');
}
</script>
</body>
</html>
